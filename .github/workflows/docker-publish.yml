name: 🐳 Docker Build & Push (GHCR Only)

on:
  push:
    branches:
      - master
      - release
      - release-lib
      - develop
      - develop-lib
    tags:
      - 'v*'
  workflow_dispatch:

# --- 新增：关键权限配置 ---
permissions:
  contents: read
  packages: write # 允许推送镜像

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 现在它有写入权了

      - name: 🏷️ Generate Tags
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/warp-docker-proxy"
          TAGS=""

          # 基础版本逻辑
          if [[ "${{ github.ref_name }}" == "release" ]]; then
            TAGS="${IMAGE_NAME}:latest"
          fi
          if [[ "${{ github.ref_name }}" == "release-lib" ]]; then
            TAGS="${IMAGE_NAME}:latest-lib"
          fi
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${IMAGE_NAME}:${{ github.ref_name }}"
          fi

          # 开发版本逻辑
          if [[ "${{ github.ref_type }}" == "branch" ]]; then
             TAGS="${TAGS},${IMAGE_NAME}:${{ github.ref_name }}"
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="${TAGS},${IMAGE_NAME}:sha-${SHORT_SHA}"

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: 📦 Build and Push
        if: ${{ steps.meta.outputs.tags != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}