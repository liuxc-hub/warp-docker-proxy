name: 🐳 Docker Build & Push (GHCR Only)

on:
  push:
    branches:
      - master
      - release
      - release-lib
      - develop
      - develop-lib
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 1. 登录 GitHub Container Registry (GHCR) ---
      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- 2. 生成标签 (仅针对 GHCR) ---
      - name: 🏷️ Generate Tags
        id: meta
        run: |
          # 定义镜像地址 (注意这里用你的 GitHub 用户名)
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/warp-docker-proxy"
          
          TAGS=""

          # --- 逻辑 A: 基础版本 (latest, latest-lib, v*) ---
          if [[ "${{ github.ref_name }}" == "release" ]]; then
            TAGS="${IMAGE_NAME}:latest"
          fi
          if [[ "${{ github.ref_name }}" == "release-lib" ]]; then
            TAGS="${IMAGE_NAME}:latest-lib"
          fi
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${IMAGE_NAME}:${{ github.ref_name }}"
          fi

          # --- 逻辑 B: 开发版本 (分支名 + SHA) ---
          # 1. 如果是分支推送，添加分支名标签
          if [[ "${{ github.ref_type }}" == "branch" ]]; then
             TAGS="${TAGS},${IMAGE_NAME}:${{ github.ref_name }}"
          fi

          # 2. 始终添加 SHA 标签 (例如 sha-a1b2c3d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="${TAGS},${IMAGE_NAME}:sha-${SHORT_SHA}"

          # --- 输出结果 ---
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      # --- 3. 构建并推送 ---
      - name: 📦 Build and Push
        if: ${{ steps.meta.outputs.tags != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}