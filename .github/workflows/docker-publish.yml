name: Build and Push to GHCR

# 1. 触发条件：推送到 main 分支或创建新标签时触发
on:
  push:
    branches: [ "release_lib" ]
    tags: [ '*.*.*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # 2. 权限设置：必须有 packages 写入权限
    permissions:
      contents: read
      packages: write

    steps:
      # 3. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 4. 登录到 GitHub Container Registry (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 提取元数据（自动生成镜像标签，如版本号、commit sha）
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            # 下面这行是新增的：如果是 main 分支，同时打上 latest 标签
            type=raw,value=latest-lib,enable=${{ github.ref == 'refs/heads/release_lib' }}

      # 6. 设置 Docker Buildx (支持缓存和高级构建)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 开启缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max